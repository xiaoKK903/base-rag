<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG知识库检索 - AI工具平台</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root {
            --config-bg: #1e1e2e;
            --config-header-bg: #2d2d44;
            --config-border: #3d3d5c;
        }
        
        .config-panel {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 340px;
            max-height: calc(100vh - 100px);
            background: var(--config-bg);
            border: 1px solid var(--config-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            z-index: 9999;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease, min-width 0.3s ease;
        }
        
        .config-panel.collapsed {
            width: 48px;
            min-width: 48px;
        }
        
        .config-panel.collapsed .config-header-buttons,
        .config-panel.collapsed .config-content {
            display: none;
        }
        
        .config-panel.collapsed .config-toggle {
            justify-content: center;
        }
        
        .panel-float-btn {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: var(--config-bg);
            border: 1px solid var(--config-border);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.2s;
        }
        
        .panel-float-btn:hover {
            transform: scale(1.1);
        }
        
        .config-header {
            padding: 10px 14px;
            background: var(--config-header-bg);
            border-bottom: 1px solid var(--config-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 40px;
            cursor: grab;
            user-select: none;
        }
        
        .config-header:active {
            cursor: grabbing;
        }
        
        .config-header h4 {
            margin: 0;
            font-size: 14px;
            color: #fff;
            white-space: nowrap;
        }
        
        .config-header-buttons {
            display: flex;
            gap: 6px;
        }
        
        .config-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.2s;
        }
        
        .config-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .config-btn.danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        
        .config-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .config-toggle-icon {
            font-size: 16px;
            cursor: pointer;
        }
        
        .config-content {
            padding: 12px 14px;
            overflow-y: auto;
            flex: 1;
            max-height: calc(100vh - 180px);
        }
        
        .config-section {
            margin-bottom: 16px;
        }
        
        .config-section-title {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--config-border);
        }
        
        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        
        .config-item label {
            font-size: 13px;
            color: #e5e7eb;
            cursor: pointer;
        }
        
        .config-item input[type="number"] {
            width: 70px;
            padding: 4px 8px;
            border: 1px solid var(--config-border);
            border-radius: 4px;
            background: #2a2a3e;
            color: #fff;
            font-size: 13px;
        }
        
        .config-buttons {
            display: flex;
            gap: 8px;
            padding-top: 10px;
            border-top: 1px solid var(--config-border);
        }
        
        .config-buttons button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-apply {
            background: #3b82f6;
            color: white;
        }
        
        .btn-apply:hover {
            background: #2563eb;
        }
        
        .btn-reset {
            background: #374151;
            color: #d1d5db;
        }
        
        .btn-reset:hover {
            background: #4b5563;
        }
        
        .debug-panel {
            margin-top: 12px;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 6px;
            border: 1px solid var(--config-border);
        }
        
        .debug-panel h5 {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: #60a5fa;
        }
        
        .debug-section {
            margin-bottom: 10px;
        }
        
        .debug-section-title {
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 4px;
            font-size: 11px;
        }
        
        .debug-section-content {
            background: #151525;
            padding: 6px 8px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            color: #d1d5db;
            line-height: 1.5;
        }
        
        .debug-result-item {
            padding: 4px 6px;
            margin-bottom: 3px;
            background: rgba(255,255,255,0.03);
            border-radius: 3px;
        }
        
        .debug-result-item:last-child {
            margin-bottom: 0;
        }
        
        .debug-score {
            color: #60a5fa;
            font-weight: 600;
        }
        
        .debug-score-improved {
            color: #4ade80;
        }
        
        .debug-score-worsened {
            color: #f87171;
        }
        
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
            background: #374151;
            border-radius: 11px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch.active {
            background: #3b82f6;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        
        .toggle-switch.active::after {
            transform: translateX(18px);
        }
        
        .rag-layout {
            display: flex;
            gap: 20px;
            height: calc(100vh - 120px);
        }
        
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            margin-right: 360px;
            transition: margin-right 0.3s ease;
        }
        
        .chat-area.panel-collapsed {
            margin-right: 70px;
        }
        
        @media (max-width: 1400px) {
            .chat-area {
                margin-right: 0;
            }
        }
        
        .feature-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-left: 6px;
        }
        
        .feature-badge.enabled {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }
        
        .feature-badge.disabled {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        
        .no-debug-msg {
            text-align: center;
            padding: 16px;
            color: #6b7280;
            font-size: 12px;
        }
        
        .config-empty {
            color: #9ca3af;
            font-style: italic;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/">首页</a>
        <a href="/rag" class="active">RAG检索</a>
        <a href="/tools">插件工具</a>
        <a href="/settings">设置</a>
    </nav>

    <div class="container" style="max-width: none; margin-top: 1.5rem; padding: 0 20px;">
        <div class="rag-layout">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>📚 知识库</h3>
                    <button class="btn btn-danger btn-outline" id="clearAllBtn" onclick="clearAllDocuments()">清空</button>
                </div>
                <div class="sidebar-stats" id="statsBar">
                    <span>文档: <strong id="docCount">0</strong></span>
                    <span>向量块: <strong id="vectorCount">0</strong></span>
                </div>

                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">
                        <strong>点击上传</strong> 或拖放文件
                    </div>
                    <div class="upload-hint">支持 .txt 和 .md 格式</div>
                    <input type="file" id="fileInput" accept=".txt,.md" style="display: none;" multiple>
                    <div class="upload-progress hidden" id="uploadProgress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                        <div style="font-size: 0.75rem; color: var(--text-light); margin-top: 0.5rem;" id="progressText">上传中...</div>
                    </div>
                </div>

                <div class="sidebar-content" id="docList">
                    <div class="empty-state" id="emptyDocs">
                        <div class="empty-state-icon">📁</div>
                        <h4>暂无文档</h4>
                        <p>上传文档后即可进行智能检索</p>
                    </div>
                </div>
            </div>

            <div class="chat-area" id="chatArea">
                <div class="chat-header">
                    <h3>🔍 RAG智能检索</h3>
                    <div class="chat-settings">
                        <label>
                            返回数量:
                            <select id="topKSelect" style="width: 60px;">
                                <option value="3">3</option>
                                <option value="5" selected>5</option>
                                <option value="10">10</option>
                            </select>
                        </label>
                        <label>
                            <input type="checkbox" id="useAllDocs" checked> 全部文档
                        </label>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state" id="welcomeState">
                        <div class="empty-state-icon">🤖</div>
                        <h4>开始智能检索</h4>
                        <p>上传文档后，输入问题即可从文档中检索相关内容</p>
                        <p style="margin-top: 8px; font-size: 13px; color: var(--text-light);">
                            💡 点击右侧 <strong>⚙️</strong> 可开启高级功能和调试模式
                        </p>
                    </div>
                </div>

                <div class="chat-input-area">
                    <div class="chat-input-row">
                        <textarea id="questionInput" placeholder="输入你的问题，按 Enter 发送..." rows="1"></textarea>
                        <button class="btn btn-primary" id="sendBtn" onclick="sendQuestion()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="panel-float-btn" id="panelFloatBtn" onclick="showConfigPanel()">⚙️</div>

    <div class="config-panel" id="configPanel">
        <div class="config-header" id="configHeader">
            <div class="config-toggle">
                <span class="config-toggle-icon" onclick="toggleConfigPanel()">⚙️</span>
                <h4 id="panelTitle">RAG 高级配置</h4>
            </div>
            <div class="config-header-buttons">
                <button class="config-btn" title="收起" onclick="toggleConfigPanel()">−</button>
                <button class="config-btn" title="关闭" onclick="hideConfigPanel()">✕</button>
            </div>
        </div>
        
        <div class="config-content">
            <div class="config-section">
                <div class="config-section-title">功能开关</div>
                
                <div class="config-item">
                    <label>
                        问题改写
                        <span class="feature-badge" id="badge-rewrite">关闭</span>
                    </label>
                    <div class="toggle-switch" id="toggle-rewrite" onclick="toggleFeature('query_rewrite')"></div>
                </div>
                
                <div class="config-item">
                    <label>
                        关键词检索 (BM25)
                        <span class="feature-badge" id="badge-keyword">关闭</span>
                    </label>
                    <div class="toggle-switch" id="toggle-keyword" onclick="toggleFeature('keyword_search')"></div>
                </div>
                
                <div class="config-item">
                    <label>
                        混合检索 (向量+关键词)
                        <span class="feature-badge" id="badge-hybrid">关闭</span>
                    </label>
                    <div class="toggle-switch" id="toggle-hybrid" onclick="toggleFeature('hybrid_search')"></div>
                </div>
                
                <div class="config-item">
                    <label>
                        结果重排
                        <span class="feature-badge" id="badge-rerank">关闭</span>
                    </label>
                    <div class="toggle-switch" id="toggle-rerank" onclick="toggleFeature('reranking')"></div>
                </div>
                
                <div class="config-item">
                    <label>
                        调试模式
                        <span class="feature-badge" id="badge-debug">关闭</span>
                    </label>
                    <div class="toggle-switch" id="toggle-debug" onclick="toggleFeature('debug')"></div>
                </div>
            </div>
            
            <div class="config-section">
                <div class="config-section-title">权重配置</div>
                
                <div class="config-item">
                    <label>向量检索权重</label>
                    <input type="number" id="input-vector-weight" value="0.7" min="0" max="1" step="0.1" onchange="updateWeight('vector_weight', this.value)">
                </div>
                
                <div class="config-item">
                    <label>关键词检索权重</label>
                    <input type="number" id="input-keyword-weight" value="0.3" min="0" max="1" step="0.1" onchange="updateWeight('keyword_weight', this.value)">
                </div>
            </div>
            
            <div class="config-buttons">
                <button class="btn-reset" onclick="resetConfig()">重置默认</button>
                <button class="btn-apply" onclick="applyConfig()">应用配置</button>
            </div>
            
            <div class="debug-panel" id="debugPanel" style="display: none;">
                <h5>🔍 最新查询调试信息</h5>
                <div id="debugContent">
                    <div class="no-debug-msg">
                        开启调试模式后进行查询<br>
                        调试信息将显示在这里
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        const API_BASE = '/rag';
        let documents = [];
        let selectedDocIds = [];
        let isPanelCollapsed = false;
        
        let currentConfig = {
            enable_query_rewrite: false,
            enable_keyword_search: false,
            enable_hybrid_search: false,
            enable_reranking: false,
            enable_debug: false,
            vector_weight: 0.7,
            keyword_weight: 0.3
        };

        document.addEventListener('DOMContentLoaded', function() {
            loadDocuments();
            loadConfig();
            setupUpload();
            setupInput();
            setupDrag();
        });

        function setupDrag() {
            const panel = document.getElementById('configPanel');
            const header = document.getElementById('configHeader');
            
            let isDragging = false;
            let startX, startY, startLeft, startTop;
            
            header.addEventListener('mousedown', (e) => {
                if (e.target.closest('.config-btn') || e.target.closest('.config-toggle-icon')) return;
                
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                
                const rect = panel.getBoundingClientRect();
                startLeft = rect.left;
                startTop = rect.top;
                
                panel.style.transition = 'none';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                let newLeft = startLeft + dx;
                let newTop = startTop + dy;
                
                const maxLeft = window.innerWidth - panel.offsetWidth;
                const maxTop = window.innerHeight - 50;
                
                newLeft = Math.max(0, Math.min(maxLeft, newLeft));
                newTop = Math.max(50, Math.min(maxTop, newTop));
                
                panel.style.left = newLeft + 'px';
                panel.style.top = newTop + 'px';
                panel.style.right = 'auto';
            });
            
            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    panel.style.transition = '';
                }
            });
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.toggle('hidden', !show);
        }

        function toggleConfigPanel() {
            const panel = document.getElementById('configPanel');
            const chatArea = document.getElementById('chatArea');
            
            isPanelCollapsed = !isPanelCollapsed;
            panel.classList.toggle('collapsed', isPanelCollapsed);
            chatArea.classList.toggle('panel-collapsed', isPanelCollapsed);
        }
        
        function hideConfigPanel() {
            const panel = document.getElementById('configPanel');
            const floatBtn = document.getElementById('panelFloatBtn');
            const chatArea = document.getElementById('chatArea');
            
            panel.style.display = 'none';
            floatBtn.style.display = 'flex';
            chatArea.classList.remove('panel-collapsed');
            isPanelCollapsed = false;
        }
        
        function showConfigPanel() {
            const panel = document.getElementById('configPanel');
            const floatBtn = document.getElementById('panelFloatBtn');
            const chatArea = document.getElementById('chatArea');
            
            panel.style.display = 'flex';
            floatBtn.style.display = 'none';
            
            if (isPanelCollapsed) {
                panel.classList.add('collapsed');
                chatArea.classList.add('panel-collapsed');
            }
        }

        async function loadConfig() {
            try {
                const response = await App.get(`${API_BASE}/config`, { showLoading: false });
                if (isSuccess(response)) {
                    currentConfig = response.data;
                    updateConfigUI();
                }
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        function updateConfigUI() {
            const featureMap = {
                'query_rewrite': 'rewrite',
                'keyword_search': 'keyword',
                'hybrid_search': 'hybrid',
                'reranking': 'rerank',
                'debug': 'debug'
            };

            for (const [configKey, uiKey] of Object.entries(featureMap)) {
                const toggle = document.getElementById(`toggle-${uiKey}`);
                const badge = document.getElementById(`badge-${uiKey}`);
                const isEnabled = currentConfig[`enable_${configKey}`];
                
                toggle.classList.toggle('active', isEnabled);
                badge.textContent = isEnabled ? '开启' : '关闭';
                badge.className = `feature-badge ${isEnabled ? 'enabled' : 'disabled'}`;
            }

            document.getElementById('input-vector-weight').value = currentConfig.vector_weight;
            document.getElementById('input-keyword-weight').value = currentConfig.keyword_weight;
            
            const debugPanel = document.getElementById('debugPanel');
            debugPanel.style.display = currentConfig.enable_debug ? 'block' : 'none';
        }

        function toggleFeature(feature) {
            const configKey = `enable_${feature}`;
            currentConfig[configKey] = !currentConfig[configKey];
            updateConfigUI();
        }

        function updateWeight(key, value) {
            currentConfig[key] = parseFloat(value);
        }

        async function applyConfig() {
            try {
                const response = await App.post(`${API_BASE}/config`, currentConfig, { showLoading: false });
                if (isSuccess(response)) {
                    App.toast.success('配置已应用');
                    currentConfig = response.data;
                    updateConfigUI();
                }
            } catch (e) {
                console.error('应用配置失败:', e);
                App.toast.error('应用配置失败');
            }
        }

        async function resetConfig() {
            try {
                const response = await App.post(`${API_BASE}/config/reset`, {}, { showLoading: false });
                if (isSuccess(response)) {
                    App.toast.success('已重置为默认配置');
                    currentConfig = response.data;
                    updateConfigUI();
                }
            } catch (e) {
                console.error('重置配置失败:', e);
                App.toast.error('重置配置失败');
            }
        }

        function setupUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            uploadArea.addEventListener('click', () => fileInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = Array.from(e.dataTransfer.files);
                uploadFiles(files);
            });

            fileInput.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                uploadFiles(files);
                fileInput.value = '';
            });
        }

        async function uploadFiles(files) {
            const validFiles = files.filter(f => {
                const ext = f.name.toLowerCase().substring(f.name.lastIndexOf('.'));
                return ['.txt', '.md'].includes(ext);
            });

            if (validFiles.length === 0) {
                App.toast.error('仅支持 .txt 和 .md 格式文件');
                return;
            }

            const progressContainer = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            progressContainer.classList.remove('hidden');
            let uploaded = 0;
            let failed = 0;

            for (let i = 0; i < validFiles.length; i++) {
                const file = validFiles[i];
                progressText.textContent = `正在处理: ${file.name} (${i + 1}/${validFiles.length})`;
                progressFill.style.width = `${(uploaded / validFiles.length) * 100}%`;

                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch(`/api${API_BASE}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();

                    if (result.success) {
                        uploaded++;
                        App.toast.success(`${file.name}: ${result.message}`);
                    } else {
                        failed++;
                        App.toast.error(`${file.name}: ${result.message}`);
                    }
                } catch (e) {
                    failed++;
                    App.toast.error(`${file.name}: 上传失败`);
                }
            }

            progressFill.style.width = '100%';
            progressText.textContent = `完成: ${uploaded} 成功, ${failed} 失败`;

            setTimeout(() => {
                progressContainer.classList.add('hidden');
                progressFill.style.width = '0%';
            }, 2000);

            await loadDocuments();
        }

        function isSuccess(response) {
            return response && (response.code === 0 || response.success === true);
        }

        async function loadDocuments() {
            try {
                const response = await App.get(`${API_BASE}/documents`, { showLoading: false });
                if (isSuccess(response)) {
                    documents = response.data?.documents || [];
                    updateDocList();
                    updateStats(response.data?.total_docs || 0, response.data?.total_vectors || 0);
                }
            } catch (e) {
                console.error('加载文档失败:', e);
            }
        }

        function updateDocList() {
            const docList = document.getElementById('docList');
            const emptyDocs = document.getElementById('emptyDocs');

            if (documents.length === 0) {
                emptyDocs.classList.remove('hidden');
                return;
            }

            emptyDocs.classList.add('hidden');

            const existingItems = docList.querySelectorAll('.doc-item');
            existingItems.forEach(item => item.remove());

            documents.forEach(doc => {
                const isSelected = selectedDocIds.includes(doc.doc_id);
                const div = document.createElement('div');
                div.className = `doc-item ${isSelected ? 'selected' : ''}`;
                div.onclick = (e) => {
                    if (e.target.closest('.doc-delete')) return;
                    toggleDocSelection(doc.doc_id);
                };
                div.innerHTML = `
                    <div class="doc-info">
                        <h4>${escapeHtml(doc.doc_name)}</h4>
                        <p>${doc.chunk_count} 个向量块</p>
                    </div>
                    <button class="btn btn-danger doc-delete" onclick="event.stopPropagation(); deleteDocument('${doc.doc_id}')">删除</button>
                `;
                docList.appendChild(div);
            });
        }

        function toggleDocSelection(docId) {
            const useAllDocs = document.getElementById('useAllDocs').checked;
            if (useAllDocs) return;

            const idx = selectedDocIds.indexOf(docId);
            if (idx === -1) {
                selectedDocIds.push(docId);
            } else {
                selectedDocIds.splice(idx, 1);
            }
            updateDocList();
        }

        function updateStats(docCount, vectorCount) {
            document.getElementById('docCount').textContent = docCount;
            document.getElementById('vectorCount').textContent = vectorCount;
        }

        async function deleteDocument(docId) {
            if (!confirm('确定要删除这个文档吗？')) return;

            try {
                const response = await fetch(`/api${API_BASE}/documents/${docId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.success) {
                    App.toast.success('文档已删除');
                    const idx = selectedDocIds.indexOf(docId);
                    if (idx !== -1) selectedDocIds.splice(idx, 1);
                    await loadDocuments();
                }
            } catch (e) {
                App.toast.error('删除失败');
            }
        }

        async function clearAllDocuments() {
            if (!confirm('确定要清空所有文档吗？此操作不可恢复。')) return;

            try {
                const response = await fetch(`/api${API_BASE}/clear`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.success) {
                    App.toast.success('已清空所有文档');
                    selectedDocIds = [];
                    await loadDocuments();
                }
            } catch (e) {
                App.toast.error('清空失败');
            }
        }

        function setupInput() {
            const input = document.getElementById('questionInput');

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendQuestion();
                }
            });

            input.addEventListener('input', () => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            });
        }

        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();

            if (!question) return;

            const welcomeState = document.getElementById('welcomeState');
            if (welcomeState) welcomeState.classList.add('hidden');

            addUserMessage(question);
            input.value = '';
            input.style.height = 'auto';

            const topK = parseInt(document.getElementById('topKSelect').value);
            const useAllDocs = document.getElementById('useAllDocs').checked;

            const requestBody = {
                question: question,
                top_k: topK
            };

            if (!useAllDocs && selectedDocIds.length > 0) {
                requestBody.doc_ids = selectedDocIds;
            }

            const typingEl = addTypingIndicator();

            try {
                const result = await App.post(`${API_BASE}/query`, requestBody, { showLoading: false });

                typingEl.remove();

                if (result.success) {
                    console.log('API返回数据:', result.data);
                    
                    if (result.data?.debug_info) {
                        console.log('调试信息:', result.data.debug_info);
                        updateDebugPanel(result.data.debug_info);
                    }
                    
                    addAssistantMessage(result.data);
                } else {
                    addErrorMessage(result.message || '查询失败');
                }
            } catch (e) {
                typingEl.remove();
                addErrorMessage('网络错误，请稍后重试');
            }
        }

        function updateDebugPanel(debugInfo) {
            const debugContent = document.getElementById('debugContent');
            
            if (!debugInfo) {
                debugContent.innerHTML = '<div class="no-debug-msg">暂无调试信息</div>';
                return;
            }
            
            let html = '';
            
            html += `<div class="debug-section">
                <div class="debug-section-title">📝 查询信息</div>
                <div class="debug-section-content">
                    <strong>原始问题:</strong> ${escapeHtml(debugInfo.original_query || '-')}<br>
                    <strong>改写后:</strong> ${debugInfo.is_rewritten ? escapeHtml(debugInfo.rewritten_query) : '<span class="config-empty">(未改写)</span>'}<br>
                    <strong>关键词:</strong> ${(debugInfo.keywords || []).join(', ') || '<span class="config-empty">-</span>'}
                </div>
            </div>`;
            
            html += `<div class="debug-section">
                <div class="debug-section-title">⚙️ 功能状态</div>
                <div class="debug-section-content">
                    ${Object.entries(debugInfo.feature_status || {}).map(([key, val]) => 
                        `<span style="color: ${val ? '#4ade80' : '#94a3b8'};">${key}: ${val ? '✓' : '✗'}</span>`
                    ).join(' | ')}
                </div>
            </div>`;
            
            html += `<div class="debug-section">
                <div class="debug-section-title">📊 权重配置</div>
                <div class="debug-section-content">
                    向量: ${debugInfo.vector_weight || 0.7} | 关键词: ${debugInfo.keyword_weight || 0.3}
                </div>
            </div>`;
            
            if (debugInfo.vector_results && debugInfo.vector_results.length > 0) {
                html += `<div class="debug-section">
                    <div class="debug-section-title">🎯 向量检索 (${debugInfo.vector_results.length} 个)</div>
                    <div class="debug-section-content">
                        ${debugInfo.vector_results.map((r, i) => `
                            <div class="debug-result-item">
                                <span class="debug-score">${(r.original_score * 100).toFixed(1)}%</span>
                                ${escapeHtml(r.doc_name)} #${r.chunk_index}
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }
            
            if (debugInfo.keyword_results && debugInfo.keyword_results.length > 0) {
                html += `<div class="debug-section">
                    <div class="debug-section-title">🔍 关键词检索 (${debugInfo.keyword_results.length} 个)</div>
                    <div class="debug-section-content">
                        ${debugInfo.keyword_results.map((r, i) => `
                            <div class="debug-result-item">
                                <span class="debug-score">${(r.original_score * 100).toFixed(1)}%</span>
                                ${escapeHtml(r.doc_name)} #${r.chunk_index}
                                ${r.matched_keywords?.length > 0 ? `<br><small>关键词: ${r.matched_keywords.join(', ')}</small>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }
            
            if (debugInfo.reranked_results && debugInfo.reranked_results.length > 0) {
                html += `<div class="debug-section">
                    <div class="debug-section-title">🔄 重排结果 (${debugInfo.reranked_results.length} 个)</div>
                    <div class="debug-section-content">
                        ${debugInfo.reranked_results.map((r, i) => {
                            const rankBefore = r.rank_before;
                            const rankAfter = r.rank_after;
                            const changed = rankBefore !== rankAfter;
                            const improved = rankAfter < rankBefore;
                            
                            return `
                                <div class="debug-result-item">
                                    <span class="debug-score">${(r.score * 100).toFixed(1)}%</span>
                                    ${escapeHtml(r.doc_name)} #${r.chunk_index}
                                    ${changed ? `<span class="${improved ? 'debug-score-improved' : 'debug-score-worsened'}">
                                        (${rankBefore}→${rankAfter}${improved ? '↑' : '↓'})
                                    </span>` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>`;
            }
            
            debugContent.innerHTML = html;
        }

        function addUserMessage(text) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="message-avatar">U</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    <div class="message-meta">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function addAssistantMessage(data) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message assistant';

            let answerText = '';
            if (data.answer) {
                answerText = data.answer;
            } else if (data.results && data.results.length > 0) {
                answerText = '根据检索结果，最相关的文档片段已列出。';
            } else {
                answerText = '未检索到相关内容，请确保已上传文档且问题与文档内容相关。';
            }

            let retrievalHtml = '';
            if (data.results && data.results.length > 0) {
                retrievalHtml = `
                    <div class="retrieval-info">
                        <h5>📎 检索到 ${data.results.length} 个相关片段</h5>
                        ${data.results.map((r, i) => `
                            <div class="retrieval-result">
                                <div class="retrieval-result-header">
                                    <span class="retrieval-source">${i + 1}. ${escapeHtml(r.doc_name)}</span>
                                    <span class="retrieval-score">相似度: ${(r.score * 100).toFixed(1)}%</span>
                                </div>
                                <div class="retrieval-text" id="retrieval-text-${i}">${escapeHtml(r.text)}</div>
                                <div class="retrieval-expand" onclick="toggleExpand(${i})">展开查看</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            let metaInfo = '';
            if (data.metadata) {
                const metaParts = [];
                if (data.metadata.used_query && data.metadata.used_query !== data.query) {
                    metaParts.push(`改写查询: ${escapeHtml(data.metadata.used_query)}`);
                }
                if (data.metadata.keywords?.length > 0) {
                    metaParts.push(`关键词: ${data.metadata.keywords.join(', ')}`);
                }
                if (data.metadata.llm_model) {
                    metaParts.push(`模型: ${data.metadata.llm_model}`);
                }
                if (metaParts.length > 0) {
                    metaInfo = `<div style="font-size: 11px; color: var(--text-light); margin-top: 8px; opacity: 0.7;">
                        ${metaParts.join(' | ')}
                    </div>`;
                }
            }

            div.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <div>${formatMarkdown(escapeHtml(answerText))}</div>
                        ${retrievalHtml}
                        ${metaInfo}
                    </div>
                    <div class="message-meta">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function toggleExpand(index) {
            const el = document.getElementById(`retrieval-text-${index}`);
            if (el) {
                el.classList.toggle('expanded');
                const btn = el.nextElementSibling;
                if (btn) {
                    btn.textContent = el.classList.contains('expanded') ? '收起' : '展开查看';
                }
            }
        }

        function addErrorMessage(text) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="message-bubble" style="border-color: var(--error-color);">
                        ❌ ${escapeHtml(text)}
                    </div>
                    <div class="message-meta">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function addTypingIndicator() {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMarkdown(text) {
            if (!text) return '';

            let result = text;
            result = result.replace(/\n/g, '<br>');

            result = result.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');

            result = result.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            result = result.replace(/\*(.*?)\*/g, '<em>$1</em>');

            return result;
        }
    </script>
</body>
</html>
